name: PR template check
run-name: Checking PR description from ${{ github.actor }}

# pull_request_target (not pull_request) so the workflow has a write token to
# leave a comment, even on PRs from forks. This is safe here ONLY because we
# never check out or run the PR's code — we read the description from the event
# payload and the template from the base branch (the canonical source of truth).
on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read          # to read .github/pull_request_template.md from base
  pull-requests: write    # to post / update the comment

# If someone edits the description several times in a row, only keep the latest run.
concurrency:
  group: pr-template-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check-description:
    runs-on: ubuntu-latest
    steps:
      # Checks out the BASE branch (default ref for pull_request_target), so the
      # template we compare against is yours, not a version edited in the PR.
      - uses: actions/checkout@v4

      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // ---- Config (edit these to reuse this workflow in another repo) ----
            const TEMPLATE_PATH = '.github/pull_request_template.md';
            const REQUIRED_HEADERS = [
              '## 🤔 Section A - Description',
              '## ✅ Verification',
              '## 🔎 Quick Self Check',
              '## 📜 BioBuilder Contributor License Agreement',
            ];
            // This section's full block must match the template word-for-word.
            const VERBATIM_SECTION = '## 📜 BioBuilder Contributor License Agreement';
            const MARKER = '<!-- pr-template-check -->';
            // --------------------------------------------------------------------

            const pr = context.payload.pull_request;
            const { owner, repo } = context.repo;
            const issue_number = pr.number;
            const body = pr.body || '';
            const template = fs.readFileSync(TEMPLATE_PATH, 'utf8');

            // Grab a section's lines: from its header to the next "## " heading (or EOF).
            const sectionLines = (text, header) => {
              const lines = text.replace(/\r\n/g, '\n').split('\n');
              const start = lines.findIndex(l => l.trim() === header);
              if (start === -1) return null;
              let end = lines.length;
              for (let i = start + 1; i < lines.length; i++) {
                if (/^##\s/.test(lines[i])) { end = i; break; }
              }
              return lines.slice(start, end);
            };

            // Normalize for the "100% copy" compare: drop trailing whitespace per line
            // and any leading/trailing blank lines. (Line endings already normalized above.)
            const normalize = (lines) => {
              const out = (lines || []).map(l => l.replace(/\s+$/, ''));
              while (out.length && out[0] === '') out.shift();
              while (out.length && out[out.length - 1] === '') out.pop();
              return out.join('\n');
            };

            // ---- Check 1: every required header is present as a full line ----
            const bodyLines = body.replace(/\r\n/g, '\n').split('\n').map(l => l.trim());
            const missingHeaders = REQUIRED_HEADERS.filter(h => !bodyLines.includes(h));

            // ---- Check 2: the verbatim section matches the template exactly ----
            const templateBlock = normalize(sectionLines(template, VERBATIM_SECTION));
            const prBlock = sectionLines(body, VERBATIM_SECTION);
            const claPresent = prBlock !== null;
            const claMatches = claPresent && normalize(prBlock) === templateBlock;

            const problems = [];
            for (const h of missingHeaders) {
              problems.push(`Missing required section: \`${h}\``);
            }
            if (claPresent && !claMatches) {
              problems.push(`The **${VERBATIM_SECTION}** section has been altered. It must be left exactly as it appears in the template.`);
            }

            const passed = problems.length === 0;

            // ---- Build the comment ----
            let commentBody;
            if (passed) {
              commentBody = [
                MARKER,
                '✅ Thank you SO MUCH for contributing to the project!! 🎉 One of the maintainers will get back to you ASAP with some feedback. 💛'
              ].join('\n');
            } else {
              commentBody = [
                MARKER,
                '👋 Thank you SO MUCH for contributing!! We ask that you fill out the following template so that we can review your code easier and get it live as quickly as possible! 💛',
                '',
                "Here's what still needs attention:",
                ...problems.map(p => `- ${p}`),
                '',
                '<details><summary>📋 Click to expand the full template</summary>',
                '',
                '```markdown',
                template.replace(/\r\n/g, '\n'),
                '```',
                '',
                '</details>',
                '',
                "_This check re-runs automatically when you edit the description, so it'll clear once everything's in place._",
              ].join('\n');
            }

            // ---- Post or update a single comment (don't spam on every edit) ----
            const existing = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100,
            });
            const prior = existing.find(c => c.body && c.body.includes(MARKER));

            if (prior) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: prior.id, body: commentBody });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body: commentBody });
            }

            // Fail the check so it shows red and can gate merges via branch protection.
            if (!passed) {
              core.setFailed(`PR description check failed:\n- ${problems.join('\n- ')}`);
            }
